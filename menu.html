<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Menú Principal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/menu.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container">
            <a class="navbar-brand" href="menu.html">
                <span class="brand-text">Alke Wallet</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <span class="nav-link user-email" id="userEmail"></span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link btn-logout" href="#" id="logoutBtn">Cerrar Sesión</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container py-5">
        <div class="welcome-section text-center mb-5">
            <h1 class="welcome-title">¡Hola, <span id="welcomeName">Bella</span>! 🌸</h1>
            <p class="welcome-subtitle">¿Qué deseas hacer hoy?</p>
        </div>
        
        <div class="balance-card mb-5">
            <div class="card">
                <div class="card-body text-center">
                    <p class="balance-label">Tu Saldo Disponible</p>
                    <h2 class="balance-amount" id="currentBalance">$0.00</h2>
                    <p class="balance-updated">Actualizado: <span id="lastUpdate"></span></p>
                </div>
            </div>
        </div>
        
        <div class="row g-4">
            <div class="col-md-4">
                <a href="deposit.html" class="menu-card-link">
                    <div class="menu-card">
                        <div class="menu-icon">💰</div>
                        <h3>Depositar</h3>
                        <p>Agrega dinero a tu billetera</p>
                    </div>
                </a>
            </div>
            
            <div class="col-md-4">
                <a href="sendmoney.html" class="menu-card-link">
                    <div class="menu-card">
                        <div class="menu-icon">💸</div>
                        <h3>Enviar Dinero</h3>
                        <p>Transfiere a tus contactos</p>
                    </div>
                </a>
            </div>
            
            <div class="col-md-4">
                <a href="transactions.html" class="menu-card-link">
                    <div class="menu-card">
                        <div class="menu-icon">📊</div>
                        <h3>Movimientos</h3>
                        <p>Revisa tu historial</p>
                    </div>
                </a>
            </div>
        </div>
        
        <div class="quick-actions mt-5">
            <h4 class="text-center mb-4">Acciones Rápidas</h4>
            <div class="row g-3">
                <div class="col-md-3 col-6">
                    <button class="quick-action-btn w-100" onclick="location.href='deposit.html'">
                        <span class="action-icon">➕</span>
                        <span>Depósito Rápido</span>
                    </button>
                </div>
                <div class="col-md-3 col-6">
                    <button class="quick-action-btn w-100" onclick="location.href='sendmoney.html'">
                        <span class="action-icon">🔄</span>
                        <span>Transferencia</span>
                    </button>
                </div>
                <div class="col-md-3 col-6">
                    <button class="quick-action-btn w-100" onclick="location.href='transactions.html'">
                        <span class="action-icon">📋</span>
                        <span>Ver Historial</span>
                    </button>
                </div>
                <div class="col-md-3 col-6">
                    <button class="quick-action-btn w-100" id="refreshBalance">
                        <span class="action-icon">🔄</span>
                        <span>Actualizar</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/menu.js"></script>
</body>
</html>
